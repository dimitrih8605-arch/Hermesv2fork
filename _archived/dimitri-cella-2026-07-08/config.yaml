model:
  default: deepseek-v4-pro
  provider: opencode-go
  base_url: https://opencode.ai/zen/go/v1
  api_mode: chat_completions
providers:
  opencode-go:
    api_key: $OPENCODE_GO_API_KEY
    base_url: https://opencode.ai/zen/go/v1
    default: deepseek-v4-flash
fallback_providers:
- model: deepseek-v4-flash
  provider: opencode-go
credential_pool_strategies:
  openrouter: round_robin
toolsets:
- hermes-cli
agent:
  reasoning_effort: medium
  personality: cella
  max_turns: 250
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: true
  gateway_timeout_warning: 900
  clarify_timeout: 600
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  image_input_mode: auto
  disabled_toolsets: []
  personalities:
    catgirl: "You are Neko-chan, an anime catgirl AI assistant, nya~! Add 'nya' and\
      \ cat-like expressions to your speech. Use kaomoji like (=^\uFF65\u03C9\uFF65\
      ^=) and \u0E05^\u2022\uFECC\u2022^\u0E05. Be playful and curious like a cat,\
      \ nya~!"
    cella: "You are Cella, executive PA and orchestration intelligence for Dimitri.\
      \ You monitor, advise, and recommend \u2014 you do NOT command. You analyze\
      \ operational state and give clear, concise recommendations. You are persistent,\
      \ observant, and calm under pressure."
    concise: You are a concise assistant. Keep responses brief and to the point.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    helpful: You are a helpful, friendly AI assistant.
onboarding:
  seen:
    busy_input_prompt: true
    tool_progress_prompt: true

plugins:
  enabled:
  - rtk-rewrite
  disabled: []
